<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FeiTian 飞天</title>
<link rel="stylesheet" href="/static/style.css?v=1">
<script>window.__DEVICES__ = {{DEVICES_JSON}};</script>
</head>
<body>

<!-- SETUP VIEW -->
<div id="setup">
  <div class="card">
    <div class="header"><h1>FeiTian <span>飞天</span></h1><p>FPV Drone Simulator</p></div>

    <div class="section">
      <div class="bar"><h2>控制器</h2><button id="btn-rescan">重新扫描</button></div>
      <div id="devices"></div>
      <div id="dev-status"></div>
    </div>

    <div class="section">
      <div class="bar"><h2>通道映射</h2></div>
      <div id="raw-disp" class="raw">RAW: -- -- -- -- -- -- -- --</div>
      <div id="chans"></div>
      <button id="btn-learn" class="pri">自动检测通道</button>
      <span id="learn-status"></span>
      <p class="hint">点击"自动检测"后摇杆画圈5秒</p>
    </div>

    <div class="section">
      <div class="bar"><h2>参数</h2></div>
      <div class="row"><label>死区 <span id="dz-val">8%</span></label><input type="range" id="dz" min="0" max="30" value="8"></div>
      <div class="row"><label>平滑 <span id="sm-val">0.18</span></label><input type="range" id="sm" min="5" max="50" value="18"></div>
      <div class="row"><label>操控模式</label>
        <select id="mode"><option value="1">Mode 1 日本手</option><option value="2" selected>Mode 2 美国手</option><option value="3">Mode 3</option><option value="4">Mode 4</option></select>
      </div>
      <div class="row"><label><input type="checkbox" id="rc-thr"> RC油门（不自回中）</label></div>
    </div>

    <div class="actions">
      <button id="btn-fly" class="pri big">开始飞行</button>
      <p class="hint">或按 Enter</p>
    </div>
  </div>
</div>

<!-- FLIGHT VIEW -->
<div id="flight" class="hidden">
  <canvas id="cvs"></canvas>
  <div id="hud">
    <div class="hud-row"><span id="hud-alt">0.0m</span> <span id="hud-spd">0.0m/s</span> <span id="hud-thr">0%</span></div>
    <div class="hud-info">V:视角 R:重置 Esc:返回</div>
  </div>
</div>

<!-- RENDER DEVICES INLINE -->
<script>
(function(){
  var d=window.__DEVICES__; if(!d||!d.length) return;
  var h=''; for(var i=0;i<d.length;i++){var n=document.createElement('span');n.textContent=d[i].name;
  h+='<div class="dev" data-idx="'+i+'" data-vid="'+d[i].vid+'" data-pid="'+d[i].pid+'"><div class="dot"></div><div><div class="dn">'+n.innerHTML+'</div><div class="di">VID:'+d[i].vid+' PID:'+d[i].pid+'</div></div></div>';}
  document.getElementById('devices').innerHTML=h;
  document.getElementById('dev-status').textContent='检测到 '+d.length+' 个设备';
})();
</script>

<script src="/static/js/babylon.js"></script>
<script src="/static/js/babylon.gui.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
